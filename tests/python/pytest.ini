[pytest]
testpaths = unit integration edge_cases regression
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Determinism settings
addopts =
    -v
    --strict-markers
    --strict-config
    --tb=short
    -p no:randomly

markers =
    unit: Pure unit tests (no I/O, no side effects)
    integration: Integration tests (mocked external deps)
    edge_case: Boundary condition and edge case tests
    regression: Bug regression tests (linked to issue numbers)
    slow: Tests that take >1 second

# CI alias: pytest --ci
[pytest:ci]
addopts =
    -v
    --strict-markers
    --tb=short
    --junitxml=reports/junit.xml
    --cov=../../src
    --cov-report=term-missing
    --cov-report=json:reports/coverage.json
    -p no:randomly
    -x
