name: Test Suite
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tests/js
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: js-test-results
          path: |
            tests/js/reports/junit.xml
            tests/js/coverage/

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        with:
          name: JS Test Results
          path: tests/js/reports/junit.xml
          reporter: jest-junit
          fail-on-error: true

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tests/python
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: tests/python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          mkdir -p reports
          pytest \
            -v \
            --strict-markers \
            --tb=short \
            --junitxml=reports/junit.xml \
            -p no:randomly \
            -x
        env:
          CI: true
          PYTHONDONTWRITEBYTECODE: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: tests/python/reports/

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        with:
          name: Python ${{ matrix.python-version }} Results
          path: tests/python/reports/junit.xml
          reporter: java-junit
          fail-on-error: true

  summary:
    name: All Tests Pass
    needs: [javascript, python]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.javascript.result }}" != "success" ] || \
             [ "${{ needs.python.result }}" != "success" ]; then
            echo "::error::One or more test suites failed"
            exit 1
          fi
          echo "All test suites passed"
